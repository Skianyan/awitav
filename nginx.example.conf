# Example: awitav static site + reverse proxy to Nest API on the same machine.
# Replace awita.example.com and port 3000 as needed.
#
# Install: sudo cp nginx.example.conf /etc/nginx/sites-available/awita
#          sudo ln -s /etc/nginx/sites-available/awita /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name awita.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name awita.example.com;

    # ssl_certificate     /etc/letsencrypt/live/awita.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/awita.example.com/privkey.pem;

    root /var/www/awita;
    index index.html;

    # Vue SPA — client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API to Nest (awita-back on port 3000)
    # Browser calls https://awita.example.com/sensors → no cross-origin CORS
    location ~ ^/(sensors|notifications|health|webhook|api)(/|$) {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
